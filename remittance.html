<html lang="ko">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>송금요청서 | TNKorea</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700&display=swap');
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&display=swap');
:root {
  --bg:#f7f4ee;--surface:#fdfbf7;--surface2:#f0ece3;--border:#e2ddd4;
  --accent:#6a8fd8;--accent2:#8b73c9;--success:#4aab82;
  --warning:#d4900a;--danger:#d96b6b;
  --text:#2d2a24;--text2:#7a7268;--text3:#a89f94;
  --radius:14px;--radius-sm:8px;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Pretendard',-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;top:-200px;right:-200px;width:600px;height:600px;background:radial-gradient(circle,rgba(106,143,216,.06) 0%,transparent 70%);pointer-events:none;z-index:0;}

/* LOGIN */
#loginScreen{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:100;background:var(--bg);}
.login-card{background:var(--surface);border:1px solid var(--border);border-radius:24px;padding:52px 48px;text-align:center;max-width:400px;width:90%;box-shadow:0 8px 40px rgba(0,0,0,.08);animation:fadeUp .5s ease;}
.login-logo{width:56px;height:56px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:16px;margin:0 auto 20px;display:flex;align-items:center;justify-content:center;font-size:24px;}
.login-card h1{font-size:22px;font-weight:700;margin-bottom:6px;}
.login-card p{font-size:14px;color:var(--text2);margin-bottom:32px;line-height:1.6;}
#googleSignInBtn{width:100%;padding:14px 24px;background:white;color:#1f1f1f;border:1px solid var(--border);border-radius:12px;font-size:15px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;transition:all .2s;font-family:'Pretendard',sans-serif;}
#googleSignInBtn:hover{background:#f0f0f0;transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.1);}
#loginError{margin-top:14px;color:var(--danger);font-size:13px;display:none;}

/* APP */
#app{display:none;min-height:100vh;}
header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 32px;display:flex;align-items:center;justify-content:space-between;height:72px;position:sticky;top:0;z-index:50;overflow:hidden;}
.header-left{display:flex;align-items:center;gap:12px;height:100%;}
.header-logo{height:56px;display:flex;align-items:center;overflow:hidden;flex-shrink:0;}
.header-title{font-size:16px;font-weight:600;}
.header-right{display:flex;align-items:center;gap:16px;}
.header-back{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--text2);text-decoration:none;padding:6px 12px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);transition:all .2s;}
.header-back:hover{border-color:var(--accent);color:var(--accent);}
.user-badge{display:flex;align-items:center;gap:8px;background:var(--surface2);border:1px solid var(--border);border-radius:100px;padding:6px 14px 6px 8px;font-size:13px;}
.user-avatar{width:24px;height:24px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:white;}
.admin-tag{font-size:10px;background:rgba(79,142,247,.15);color:var(--accent);border:1px solid rgba(79,142,247,.3);border-radius:4px;padding:2px 6px;font-weight:600;letter-spacing:.5px;}
.btn-logout{background:transparent;border:1px solid var(--border);color:var(--text2);border-radius:8px;padding:7px 14px;font-size:13px;cursor:pointer;font-family:'Pretendard',sans-serif;transition:all .2s;}
.btn-logout:hover{border-color:var(--danger);color:var(--danger);}

/* TABS */
.tab-nav{display:flex;background:var(--surface);border-bottom:1px solid var(--border);padding:0 32px;gap:4px;position:sticky;top:72px;z-index:49;}
.tab-btn{background:none;border:none;color:var(--text2);font-size:14px;font-weight:500;padding:14px 18px;cursor:pointer;font-family:'Pretendard',sans-serif;border-bottom:2px solid transparent;transition:all .2s;white-space:nowrap;}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent);}
.tab-btn:hover:not(.active){color:var(--text);}

/* MAIN */
.main{padding:28px 32px;max-width:860px;margin:0 auto;position:relative;z-index:1;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px;margin-bottom:16px;}
.card-title{font-size:15px;font-weight:700;margin-bottom:18px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.card-title .icon{width:28px;height:28px;background:rgba(79,142,247,.1);border:1px solid rgba(79,142,247,.2);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;}
.step-badge{font-size:11px;font-weight:700;background:var(--accent);color:white;border-radius:6px;padding:2px 8px;letter-spacing:.5px;}

/* FORM */
.fg{display:grid;gap:13px;}
.fg2{grid-template-columns:1fr 1fr;}
.fg3{grid-template-columns:1fr 1fr 1fr;}
.fg4{grid-template-columns:1fr 1fr 1fr 1fr;}
.form-group{display:flex;flex-direction:column;gap:5px;}
.form-group.full{grid-column:1/-1;}
.form-group.s2{grid-column:span 2;}
label{font-size:12px;font-weight:600;color:var(--text2);display:flex;align-items:center;gap:4px;}
label .req{color:var(--accent);}
input,select,textarea{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);padding:10px 12px;font-size:13px;font-family:'Pretendard',sans-serif;transition:border-color .2s;outline:none;width:100%;}
input:focus,select:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(106,143,216,.12);}
input[readonly]{opacity:.65;cursor:not-allowed;}
input.auto{background:rgba(79,142,247,.07);border-color:rgba(79,142,247,.25);font-family:'DM Mono',monospace;font-weight:700;color:var(--accent);cursor:default;opacity:1;}
input.auto-warn{background:rgba(212,144,10,.07);border-color:rgba(212,144,10,.25);font-family:'DM Mono',monospace;font-weight:700;color:var(--warning);cursor:default;opacity:1;}
select option{background:var(--surface2);}
textarea{resize:vertical;min-height:68px;}

/* ITEM CARD */
#itemsList{display:flex;flex-direction:column;gap:12px;}
.item-card{background:var(--surface);border:1.5px solid var(--border);border-radius:12px;overflow:hidden;transition:border-color .2s;}
.item-card:hover{border-color:rgba(106,143,216,.35);}
.item-card.expanded{border-color:rgba(106,143,216,.45);}

.item-header{display:flex;align-items:center;gap:10px;padding:12px 16px;background:var(--surface2);cursor:pointer;user-select:none;}
.item-seq{width:22px;height:22px;background:var(--accent);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:white;flex-shrink:0;}
.item-hinfo{flex:1;display:flex;align-items:center;gap:8px;flex-wrap:wrap;min-width:0;}
.item-htitle{font-size:13px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:200px;}
.item-hsub{font-size:11px;color:var(--text3);}
.item-hpay{font-size:14px;font-weight:700;font-family:'DM Mono',monospace;color:var(--accent);margin-left:auto;white-space:nowrap;flex-shrink:0;}
.item-toggle{font-size:11px;color:var(--text3);transition:transform .2s;flex-shrink:0;}
.item-toggle.open{transform:rotate(180deg);}
.item-del{background:none;border:none;color:var(--danger);font-size:15px;cursor:pointer;opacity:.5;transition:opacity .2s;padding:2px 4px;flex-shrink:0;}
.item-del:hover{opacity:1;}

.item-body{display:none;padding:16px;}
.item-body.open{display:block;}

/* SUB SECTION */
.ss{margin-bottom:16px;}
.ss:last-child{margin-bottom:0;}
.ss-title{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px;padding-bottom:7px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:6px;}
.dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.db{background:var(--accent);} .dg{background:var(--success);} .dp{background:var(--accent2);} .do{background:var(--warning);}

/* TYPE BADGE */
.tb{display:inline-flex;align-items:center;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:700;letter-spacing:.3px;white-space:nowrap;}
.tb-vat{background:rgba(74,171,130,.12);color:var(--success);border:1px solid rgba(74,171,130,.3);}
.tb-w33{background:rgba(212,144,10,.1);color:var(--warning);border:1px solid rgba(212,144,10,.25);}
.tb-w88{background:rgba(217,107,107,.1);color:var(--danger);border:1px solid rgba(217,107,107,.25);}
.tb-tour{background:rgba(139,115,201,.12);color:var(--accent2);border:1px solid rgba(139,115,201,.3);}
.tb-etc{background:rgba(106,143,216,.1);color:var(--accent);border:1px solid rgba(106,143,216,.2);}

/* CALC BAR */
.calc-bar{display:flex;gap:0;margin-top:10px;background:rgba(79,142,247,.05);border:1px solid rgba(79,142,247,.15);border-radius:8px;overflow:hidden;}
.cb-item{flex:1;padding:10px 14px;display:flex;flex-direction:column;gap:3px;border-right:1px solid rgba(79,142,247,.1);}
.cb-item:last-child{border-right:none;}
.cb-l{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;}
.cb-v{font-size:13px;font-weight:700;font-family:'DM Mono',monospace;color:var(--text2);}
.cb-v.pay{color:var(--accent);font-size:15px;}

/* TOUR BOX */
.tour-box{background:rgba(139,115,201,.05);border:1px solid rgba(139,115,201,.2);border-radius:8px;padding:12px 14px;margin-top:10px;}
.tour-box-title{font-size:11px;font-weight:700;color:var(--accent2);margin-bottom:10px;display:flex;align-items:center;gap:5px;}

/* TOTAL */
.total-card{background:var(--surface);border:2px solid rgba(106,143,216,.3);border-radius:var(--radius);padding:18px 24px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:14px;}
.totals{display:flex;gap:20px;flex-wrap:wrap;align-items:center;}
.tot-item{display:flex;flex-direction:column;gap:2px;}
.tot-l{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;}
.tot-v{font-size:15px;font-weight:700;font-family:'DM Mono',monospace;color:var(--text2);}
.tot-v.main{color:var(--accent);font-size:22px;}
.tot-sep{width:1px;background:var(--border);align-self:stretch;}

/* BUTTONS */
.btn{padding:10px 20px;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;font-family:'Pretendard',sans-serif;border:none;transition:all .2s;display:inline-flex;align-items:center;gap:7px;}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:white;}
.btn-primary:hover{opacity:.9;transform:translateY(-1px);box-shadow:0 4px 16px rgba(106,143,216,.3);}
.btn-primary:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-secondary{background:var(--surface2);border:1px solid var(--border);color:var(--text);}
.btn-secondary:hover{border-color:var(--accent);color:var(--accent);}
.btn-ghost{background:none;border:1.5px dashed var(--border);color:var(--text2);border-radius:10px;padding:10px 20px;font-size:13px;font-weight:500;cursor:pointer;font-family:'Pretendard',sans-serif;transition:all .2s;width:100%;display:flex;align-items:center;justify-content:center;gap:6px;}
.btn-ghost:hover{border-color:var(--accent);color:var(--accent);}
.btn-danger{background:transparent;border:1px solid var(--danger);color:var(--danger);}
.btn-danger:hover{background:rgba(217,107,107,.08);}
.btn-sm{padding:6px 12px;font-size:12px;border-radius:7px;}

/* TABLE */
.tw{overflow-x:auto;}
table.lt{width:100%;border-collapse:collapse;font-size:13px;}
table.lt th{text-align:left;font-size:11px;font-weight:600;color:var(--text3);letter-spacing:.8px;text-transform:uppercase;padding:9px 12px;border-bottom:1px solid var(--border);white-space:nowrap;}
table.lt td{padding:12px;border-bottom:1px solid var(--border);vertical-align:middle;}
table.lt tr:last-child td{border-bottom:none;}
table.lt tr:hover td{background:rgba(106,143,216,.02);}
.mono{font-family:'DM Mono',monospace;}

/* SUMMARY CHIPS */
.sr{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:20px;}
.sc{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:13px 18px;flex:1;min-width:110px;}
.sc .sl{font-size:11px;color:var(--text2);margin-bottom:3px;}
.sc .sv{font-size:17px;font-weight:700;font-family:'DM Mono',monospace;}
.sv.accent{color:var(--accent);}.sv.success{color:var(--success);}.sv.warning{color:var(--warning);}

/* BADGE */
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:100px;font-size:12px;font-weight:600;}
.badge::before{content:'';width:5px;height:5px;border-radius:50%;background:currentColor;}
.bp{background:rgba(212,144,10,.1);color:var(--warning);}
.bc{background:rgba(106,143,216,.1);color:var(--accent);}
.bd{background:rgba(74,171,130,.1);color:var(--success);}
.br{background:rgba(217,107,107,.1);color:var(--danger);}

/* MODAL */
.mo{position:fixed;inset:0;background:rgba(0,0,0,.35);backdrop-filter:blur(4px);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:28px;max-width:600px;width:100%;box-shadow:0 16px 48px rgba(0,0,0,.12);animation:fadeUp .3s ease;max-height:90vh;overflow-y:auto;}
.modal-title{font-size:17px;font-weight:700;margin-bottom:18px;display:flex;align-items:center;justify-content:space-between;}
.modal-close{background:none;border:none;color:var(--text2);cursor:pointer;font-size:20px;line-height:1;}
.dr{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--border);font-size:13px;gap:12px;}
.dr:last-child{border-bottom:none;}
.dl{color:var(--text2);flex-shrink:0;}
.dv{font-weight:500;text-align:right;}
.modal-actions{display:flex;gap:10px;margin-top:20px;}
.modal-actions .btn{flex:1;justify-content:center;}

/* MISC */
.empty-state{text-align:center;padding:48px;color:var(--text3);font-size:14px;}
.empty-state .ei{font-size:36px;margin-bottom:12px;}
.loading{display:flex;align-items:center;justify-content:center;gap:8px;color:var(--text2);font-size:14px;padding:32px;}
.spinner{width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;}
.toast{position:fixed;bottom:24px;right:24px;background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:14px 20px;font-size:13px;z-index:999;box-shadow:0 4px 16px rgba(0,0,0,.1);transform:translateY(80px);opacity:0;transition:all .3s cubic-bezier(.34,1.56,.64,1);display:flex;align-items:center;gap:10px;max-width:320px;}
.toast.show{transform:translateY(0);opacity:1;}
.toast.success{border-color:rgba(74,171,130,.4);}
.toast.error{border-color:rgba(217,107,107,.4);}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
@keyframes spin{to{transform:rotate(360deg);}}
.fade-in{animation:fadeUp .4s ease;}
@media(max-width:640px){
  .fg2,.fg3,.fg4{grid-template-columns:1fr;}
  .form-group.s2{grid-column:span 1;}
  .main{padding:14px;}header{padding:0 14px;}
  .tab-nav{padding:0 14px;overflow-x:auto;}
  .header-title{display:none;}
}
/* AUTOCOMPLETE */
.ac-wrap{position:relative;}
.ac-list{position:absolute;top:calc(100% + 2px);left:0;right:0;background:var(--surface);border:1.5px solid var(--accent);border-radius:var(--radius-sm);z-index:100;max-height:180px;overflow-y:auto;box-shadow:0 4px 16px rgba(0,0,0,.1);}
.ac-item{padding:9px 12px;font-size:13px;cursor:pointer;color:var(--text);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;}
.ac-item:last-child{border-bottom:none;}
.ac-item:hover,.ac-item.active{background:rgba(106,143,216,.1);color:var(--accent);}
.ac-item .ac-icon{font-size:11px;color:var(--text3);}
</style>
</head>
<body>

<!-- Login -->
<div id="loginScreen">
  <div class="login-card">
    <div class="login-logo">💸</div>
    <h1>송금요청서</h1>
    <p>TNKorea 임직원 전용 시스템입니다.<br>Google 계정으로 로그인하세요.</p>
    <button id="googleSignInBtn" onclick="signInWithGoogle()">
      <svg width="18" height="18" viewBox="0 0 18 18">
        <path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z"/>
        <path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332C2.438 15.983 5.482 18 9 18z"/>
        <path fill="#FBBC05" d="M3.964 10.707c-.18-.54-.282-1.117-.282-1.707s.102-1.167.282-1.707V4.961H.957C.347 6.175 0 7.55 0 9s.348 2.825.957 4.039l3.007-2.332z"/>
        <path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.482 0 2.438 2.017.957 4.961L3.964 7.293C4.672 5.166 6.656 3.58 9 3.58z"/>
      </svg>
      Google 계정으로 로그인
    </button>
    <div id="loginError">접근 권한이 없는 계정입니다.</div>
  </div>
</div>

<!-- App -->
<div id="app">
  <header>
    <div class="header-left">
      <a href="index.html" style="display:flex;align-items:center;text-decoration:none;" title="홈으로">
        <div class="header-logo">
          <img src="https://j33www.github.io/tnkorea-hub/logo.png" alt="TNKorea"
            style="height:56px;max-height:56px;width:auto;max-width:160px;object-fit:contain;"
            onerror="this.style.display='none'">
        </div>
      </a>
      <span class="header-title">송금요청서</span>
    </div>
    <div class="header-right">
      <a href="index.html" class="header-back">← 허브로</a>
      <div class="user-badge">
        <div class="user-avatar" id="userAvatar">?</div>
        <span id="userNameDisp" style="font-size:12px;color:var(--text2);"></span>
        <span class="admin-tag" id="adminTag" style="display:none;">ADMIN</span>
      </div>
      <button class="btn-logout" onclick="signOut()">로그아웃</button>
    </div>
  </header>

  <div class="tab-nav">
    <button class="tab-btn active" onclick="showTab('write')" id="tab-write">✏️ 요청서 작성</button>
    <button class="tab-btn" onclick="showTab('history')" id="tab-history">📋 내 이력</button>
    <button class="tab-btn" onclick="showTab('admin')" id="tab-admin" style="display:none;">⚙️ 관리자</button>
  </div>

  <div class="main">

    <!-- WRITE -->
    <div id="tabContent-write" class="fade-in">

      <!-- STEP 1 기본 정보 -->
      <div class="card">
        <div class="card-title"><div class="icon">📋</div>기본 정보<span class="step-badge">STEP 1</span></div>
        <div class="fg fg3">
          <div class="form-group">
            <label>작성자 <span class="req">*</span></label>
            <input type="text" id="f-requester" readonly>
          </div>
          <div class="form-group">
            <label>회사명 <span class="req">*</span></label>
            <select id="f-company">
              <option value="">선택</option>
              <option value="티앤코리아">티앤코리아</option>
              <option value="아이지에이엠">아이지에이엠</option>
            </select>
          </div>
          <div class="form-group">
            <label>작성일 <span class="req">*</span></label>
            <input type="date" id="f-date">

function onC1(id){

  if(!c1||!CAT_TREE[c1]){s2.innerHTML='<option value="">대분류 먼저 선택</option>';s2.disabled=true;clearCalc(id);return;}
  const subs=CAT_TREE[c1];
  s2.innerHTML='<option value="">선택</option>'+subs.map(s=>`<option value="${s.type}">${s.label}</option>`).join('');
  s2.disabled=false;

  // 사업자번호 / 주민번호 라벨 동적 변경
  const lbl=document.getElementById(`bizlabel-${id}`);
  const biz=document.getElementById(`biz-${id}`);
  if(lbl&&biz){
    if(c1==='인건비'){
      lbl.textContent='주민번호 (인건비)';
      biz.placeholder='000000-0000000';
    }else if(c1==='거래처'){
      lbl.textContent='사업자번호';
      biz.placeholder='000-00-00000';
    }else{
      lbl.textContent='사업자번호 / 주민번호';
      biz.placeholder='000-00-00000';
    }
  }

  // 선택지 1개면 자동선택
  if(subs.length===1){s2.value=subs[0].type;onC2(id);}
  else clearCalc(id);
  updH(id);
}
function onC2(id){
  const c1=document.getElementById(`c1-${id}`).value;
  const type=document.getElementById(`c2-${id}`).value;
  if(!type){clearCalc(id);return;}
  const sub=(CAT_TREE[c1]||[]).find(s=>s.type===type);

  const rd=document.getElementById(`rdisp-${id}`);
  if(rd)rd.value=sub?sub.rate:'-';

  const taxEl=document.getElementById(`tax-${id}`);
  if(isEtc(type)){taxEl.readOnly=false;taxEl.classList.remove('auto');taxEl.placeholder='세액 직접 입력';}
  else{taxEl.readOnly=true;taxEl.classList.add('auto');}

  const tb=document.getElementById(`tb-${id}`);

function getType(id){return document.getElementById(`c2-${id}`)?.value||'etc_add';}
function isEtc(type){return type==='etc_add'||type==='etc_sub';}

function clearCalc(id){
  ['tax-','pay-'].forEach(f=>{const e=document.getElementById(f+id);if(e)e.value='';});
  ['tbase-','twht-','emp-','ded-'].forEach(f=>{const e=document.getElementById(f+id);if(e)e.value='';});
  const cb=document.getElementById(`cb-${id}`);if(cb)cb.style.display='none';
  // 세액 입력 필드 상태 초기화
  const taxEl=document.getElementById(`tax-${id}`);
  if(taxEl){taxEl.readOnly=true;taxEl.classList.add('auto');taxEl.placeholder='자동계산';}
  updTotal();
}

function calc(id){
  const supply=parseFloat(document.getElementById(`sup-${id}`)?.value)||0;
  const type=getType(id);
  const taxEl=document.getElementById(`tax-${id}`),payEl=document.getElementById(`pay-${id}`);
  if(!taxEl||!payEl)return;

  let tax=0,pay=0,tbase=0,twht=0,emp=0,ded=0;

  if(type==='vat'){
    // 세금계산서: 지급액 = 공급가액 + VAT
    tax=Math.round(supply*R.VAT);pay=supply+tax;
  }else if(type==='w33'){
    // 사업소득 3.3%: 지급액 = 공급가액 - 원천세
    tax=Math.round(supply*R.W33);pay=supply-tax;
  }else if(type==='w88'){
    // 사업소득 8.8%: 지급액 = 공급가액 - 원천세
    tax=Math.round(supply*R.W88);pay=supply-tax;
  }else if(type==='tour'){
    // 관광통역안내사 올바른 계산식
    // 과세표준(요율기준금액) = 급여 × (1 − 0.256)
    // 원천세   = 급여 × 3.3%            (과세표준 아닌 급여 기준)
    // 고용보험 = 과세표준 × 0.8%         (과세표준 기준)
    // 공제액   = 원천세 + 고용보험
    tbase = Math.round(supply * (1 - R.TOUR_N));   // 과세표준: 50,000 × 0.744 = 37,200
    twht  = Math.round(supply * R.TOUR_W);          // 원천세:   50,000 × 0.033 = 1,650
    emp   = Math.round(tbase  * R.EMP);             // 고용보험: 37,200 × 0.008 = 298
    ded   = twht + emp;                             // 총공제:   1,650 + 298 = 1,948
    tax   = twht;
    pay   = supply - ded;                           // 지급액:   50,000 - 1,948 = 48,052
    sv(id,'tbase',tbase); sv(id,'twht',twht); sv(id,'emp',emp); sv(id,'ded',ded);
  }else{
    // 직접입력: 세액 수동, 지급액 자동 계산
    taxEl.readOnly=false; taxEl.classList.remove('auto');
    tax = parseFloat(taxEl.value)||0;
    // etc_add: 지급액 = 공급가액 + 세액 (세금계산서 방식)
    // etc_sub: 지급액 = 공급가액 - 세액 (원천징수 방식)
    pay = type==='etc_sub' ? supply - tax : supply + tax;
  }

  if(!isEtc(type)){taxEl.value=tax||'';taxEl.readOnly=true;taxEl.classList.add('auto');}
  payEl.value=pay||'';

  // 계산 요약바
  const cb=document.getElementById(`cb-${id}`);
  if(cb&&supply>0){
    cb.style.display='flex';
    const tlEl=document.getElementById(`cb-tl-${id}`);
    if(tlEl)tlEl.textContent=type==='tour'?'총공제액':(type==='vat'?'VAT':(type==='etc_sub'?'원천세(직접)':'세액'));
    sv2(id,'cb-s',`₩${supply.toLocaleString()}`);
    let taxDisp;
    if(type==='tour')      taxDisp=`-₩${ded.toLocaleString()}`;
    else if(type==='vat')  taxDisp=`+₩${tax.toLocaleString()}`;
    else if(type==='etc_sub') taxDisp=`-₩${tax.toLocaleString()}`;
    else                   taxDisp=`+₩${tax.toLocaleString()}`; // etc_add
    sv2(id,'cb-t',taxDisp);
    sv2(id,'cb-p',`₩${Math.round(pay).toLocaleString()}`);
  }else if(cb)cb.style.display='none';

  updH(id);updTotal();
}

// 자동완성 시스템 (localStorage 기반 히스토리)
// 저장 대상: 행사명, 구매처/수취인, 사업자번호, 계좌번호, 예금주

const AC_KEYS = {
  eventname: 'tnk_ac_eventname',
  merchant:  'tnk_ac_merchant',
  bizno:     'tnk_ac_bizno',
  account:   'tnk_ac_account',
  holder:    'tnk_ac_holder',
  detail:    'tnk_ac_detail',
};
const AC_MAX = 30; // 항목당 최대 저장 수

function acLoad(key){ try{ return JSON.parse(localStorage.getItem(key)||'[]'); }catch{return [];} }
function acSave(key, val){
  if(!val||!val.trim()) return;
  val = val.trim();
  let arr = acLoad(key);
  arr = [val, ...arr.filter(v=>v!==val)].slice(0, AC_MAX);
  localStorage.setItem(key, JSON.stringify(arr));
}

// 제출 시 모든 입력값 저장
function saveAllToHistory(items, eventname){
  acSave(AC_KEYS.eventname, eventname);
  items.forEach(it=>{
    acSave(AC_KEYS.merchant, it.merchant);
    acSave(AC_KEYS.bizno,    it.bizno);
    acSave(AC_KEYS.account,  it.account);
    acSave(AC_KEYS.holder,   it.holder);
    acSave(AC_KEYS.detail,   it.detail);
  });
}

// ── 자동완성 드롭다운 붙이기 ──────────────────────────
let _acActive = null; // 현재 열린 드롭다운 input ID

function acAttach(inputId, acKey, opts={}){
  const el = document.getElementById(inputId);
  if(!el) return;

  // 이미 wrap 되어 있으면 스킵
  if(el.parentElement.classList.contains('ac-wrap')) return;

  // wrap
  const wrap = document.createElement('div');
  wrap.className = 'ac-wrap';
  el.parentElement.insertBefore(wrap, el);
  wrap.appendChild(el);

  const list = document.createElement('div');
  list.className = 'ac-list';
  list.style.display = 'none';
  wrap.appendChild(list);

  let activeIdx = -1;

  function showList(q){
    const all = acLoad(acKey);
    const filtered = q
      ? all.filter(v=>v.toLowerCase().includes(q.toLowerCase()))
      : all;
    if(!filtered.length){ list.style.display='none'; return; }
    list.innerHTML = filtered.slice(0,10).map((v,i)=>
      `<div class="ac-item" data-val="${v.replace(/"/g,'&quot;')}" data-idx="${i}">
        <span class="ac-icon">🕐</span>${v}
       </div>`
    ).join('');
    list.style.display = 'block';
    activeIdx = -1;
    list.querySelectorAll('.ac-item').forEach(item=>{
      item.addEventListener('mousedown', e=>{
        e.preventDefault();
        selectAcItem(el, item.dataset.val, opts.onSelect);
        list.style.display='none';
      });
    });
    _acActive = inputId;
  }

  el.addEventListener('input', ()=> showList(el.value));
  el.addEventListener('focus', ()=> showList(el.value));
  el.addEventListener('blur',  ()=> setTimeout(()=>{ list.style.display='none'; }, 150));

  el.addEventListener('keydown', e=>{
    const items = list.querySelectorAll('.ac-item');
    if(list.style.display==='none'||!items.length) return;
    if(e.key==='ArrowDown'){
      e.preventDefault();
      activeIdx = Math.min(activeIdx+1, items.length-1);
      items.forEach((it,i)=>it.classList.toggle('active',i===activeIdx));
    } else if(e.key==='ArrowUp'){
      e.preventDefault();
      activeIdx = Math.max(activeIdx-1, 0);
      items.forEach((it,i)=>it.classList.toggle('active',i===activeIdx));
    } else if(e.key==='Enter'&&activeIdx>=0){
      e.preventDefault();
      selectAcItem(el, items[activeIdx].dataset.val, opts.onSelect);
      list.style.display='none';
    } else if(e.key==='Escape'){
      list.style.display='none';
    }
  });
}

function selectAcItem(el, val, onSelect){
  el.value = val;
  el.dispatchEvent(new Event('input', {bubbles:true}));
  if(onSelect) onSelect(val);
}

// 항목 추가될 때마다 자동완성 붙이기
function acAttachItem(id){

// SUBMIT
async function submitRequest(){
  const requester=document.getElementById('f-requester').value;
  const company=document.getElementById('f-company').value;
  const date=document.getElementById('f-date').value;
  const eventname=document.getElementById('f-eventname').value.trim();
  const memo=document.getElementById('f-memo').value.trim();
  const items=collectItems();
  if(!company){showToast('회사명을 선택해주세요.','error');return;}
  if(!date){showToast('작성일을 입력해주세요.','error');return;}
  if(!eventname){showToast('행사명을 입력해주세요.','error');return;}
  if(!items.length){showToast('최소 1건의 항목을 입력해주세요.','error');return;}
  for(let i=0;i<items.length;i++){
    const it=items[i];
    if(!it.cat1){showToast(`${i+1}번: 대분류를 선택해주세요.`,'error');return;}
    if(!it.type){showToast(`${i+1}번: 세부구분을 선택해주세요.`,'error');return;}
    if(!it.merchant){showToast(`${i+1}번: 구매처/수취인을 입력해주세요.`,'error');return;}
    if(!it.supply){showToast(`${i+1}번: 공급가액을 입력해주세요.`,'error');return;}
    if(!it.bank){showToast(`${i+1}번: 은행을 선택해주세요.`,'error');return;}
    if(!it.account){showToast(`${i+1}번: 계좌번호를 입력해주세요.`,'error');return;}
  }

  // GAS URL 미설정 체크
  if(!GAS_URL||GAS_URL==='YOUR_GAS_URL_HERE'){
    showToast('⚠️ GAS_URL이 설정되지 않았습니다. remittance_GAS.js를 Apps Script에 배포 후 URL을 입력해주세요.','error');
    return;
  }

  const btn=document.getElementById('submitBtn');
  btn.disabled=true;btn.innerHTML='<div class="spinner" style="width:15px;height:15px;border-width:2px;"></div> 제출 중...';
  const totalPay=items.reduce((s,it)=>s+it.pay,0);
  const fd=new FormData();
  fd.append('action','addRemittance');fd.append('requester',requester);fd.append('email',currentUser.email);
  fd.append('company',company);fd.append('date',date);fd.append('eventname',eventname);fd.append('memo',memo);
  fd.append('items',JSON.stringify(items));fd.append('totalPay',totalPay);fd.append('itemCount',items.length);
  try{
    const res=await fetch(GAS_URL,{method:'POST',body:fd});
    if(!res.ok) throw new Error(`HTTP ${res.status}`);
    const d=await res.json();
    if(d.status==='ok'){
      saveAllToHistory(items, eventname);  // 자동완성 히스토리 저장
      showToast('✅ 요청서가 제출되었습니다!','success');
      resetForm();showTab('history');loadHistory();
    }
    else throw new Error(d.message||'서버 오류');
  }catch(e){
    showToast('❌ 제출 실패: '+e.message,'error');
  }finally{btn.disabled=false;btn.innerHTML='📤 요청서 제출';}
}

// ── 직원용: 상태명을 친화적으로 변환 ──────────────────────
function statusForEmployee(s){
  const map={'검토중':'검토중','승인':'승인','반려':'반려 (재제출 가능)','완료':'송금 완료'};
  return map[s]||s||'검토중';
}
// ── GAS 상태명 매핑 (내부) ────────────────────────────────
// GAS 저장값: 검토중 | 승인 | 반려 | 완료
// 기존 GAS에 대기/처리중 등이 있을 수 있으므로 호환 처리
function normalizeStatus(s){
  if(!s||s==='대기'||s==='검토중') return '검토중';
  if(s==='처리중'||s==='승인') return '승인';
  if(s==='반려') return '반려';
  if(s==='완료') return '완료';
  return s;
}

async function loadHistory(){
  const el=document.getElementById('historyContent');
  el.innerHTML='<div class="loading"><div class="spinner"></div> 불러오는 중...</div>';
  try{
    if(!GAS_URL||GAS_URL==='YOUR_GAS_URL_HERE') throw new Error('GAS URL이 설정되지 않았습니다');
    const yr=document.getElementById('histYearFilter').value;
    const mo=document.getElementById('histMonthFilter').value;
    const res=await fetch(`${GAS_URL}?action=getRemittances&email=${encodeURIComponent(currentUser.email)}&year=${yr}&month=${mo||''}`);
    if(!res.ok) throw new Error('서버 응답 오류 ('+res.status+')');
    const d=await res.json();
    if(!d.rows?.length){
      el.innerHTML='<div class="empty-state"><div class="ei">📭</div><div>이력이 없습니다.</div></div>';
      return;
    }
    const tbody=d.rows.map(r=>{
      const st=normalizeStatus(r.status);
      const badge=sb(st);
      // 직원에게 보이는 날짜: 승인/완료이면 처리일시, 아니면 '-'
      const sendDate=(st==='승인'||st==='완료')?(r.processedAt||r.paydate||'-'):'-';
      // 반려건: 재제출 버튼 추가
      const actionBtn=st==='반려'
        ? `<button class="btn btn-sm" style="background:rgba(217,107,107,.12);color:var(--danger);border:1px solid rgba(217,107,107,.3)" onclick="resubmit('${r.id}')">✏️ 재제출</button>`
        : `<button class="btn btn-secondary btn-sm" onclick="openDetail('${r.id}')">보기</button>`;
      return `<tr>
        <td class="mono" style="font-size:11px">${r.id||'-'}</td>
        <td>${r.date||'-'}</td>
        <td style="font-weight:500">${r.eventname||'-'}</td>
        <td>${r.company||'-'}</td>
        <td class="mono" style="text-align:right;color:var(--accent)">₩${(r.totalPay||0).toLocaleString()}</td>
        <td style="text-align:center">${r.itemCount||'-'}건</td>
        <td>${badge}</td>
        <td style="color:var(--text3);font-size:12px">${sendDate}</td>
        <td>${actionBtn}</td>
      </tr>`;
    }).join('');
    el.innerHTML=`<div class="tw"><table class="lt"><thead><tr>
      <th>요청번호</th><th>작성일</th><th>행사명</th><th>법인</th>
      <th style="text-align:right">지급액</th><th>항목</th><th>상태</th>
      <th>송금일</th><th></th>
    </tr></thead><tbody>${tbody}</tbody></table></div>`;
  }catch(e){
    el.innerHTML=`<div class="empty-state"><div class="ei">⚠️</div><div>${e.message}</div></div>`;
  }
}

    document.getElementById('adm-processing').textContent=rows.filter(r=>r.status==='승인').length;
    document.getElementById('adm-done').textContent=rows.filter(r=>r.status==='완료').length;
    document.getElementById('adm-total').textContent='₩'+rows.reduce((s,r)=>s+(parseInt(r.totalPay)||0),0).toLocaleString();
    if(!rows.length){el.innerHTML='<div class="empty-state"><div class="ei">📭</div><div>데이터가 없습니다.</div></div>';return;}
    const tbody=rows.map(r=>`<tr>
      <td class="mono" style="font-size:11px">${r.id||'-'}</td>
      <td>${r.date||'-'}</td>
      <td style="font-weight:500">${r.requester||'-'}</td>
      <td>${r.eventname||'-'}</td>
      <td>${r.company||'-'}</td>
      <td class="mono" style="text-align:right;color:var(--accent)">₩${(r.totalPay||0).toLocaleString()}</td>
      <td style="text-align:center">${r.itemCount||'-'}건</td>
      <td>${sb(r.status)}</td>
      <td><button class="btn btn-secondary btn-sm" onclick="openDetail('${r.id}',true)">처리</button></td>
    </tr>`).join('');
    el.innerHTML=`<div class="tw"><table class="lt"><thead><tr>
      <th>요청번호</th><th>작성일</th><th>요청자</th><th>행사명</th><th>법인</th>
      <th style="text-align:right">지급액</th><th>항목</th><th>상태</th><th></th>
    </tr></thead><tbody>${tbody}</tbody></table></div>`;
  }catch(e){
    el.innerHTML=`<div class="empty-state"><div class="ei">⚠️</div><div>${e.message}</div></div>`;
  }
}

// ── 항목 상세 테이블 HTML 생성 (공통) ────────────────────
function buildItemsTable(items){
  if(!items.length) return '<div style="color:var(--text3);font-size:13px;padding:8px 0">항목 없음</div>';
  const rows=items.map((it,i)=>`<tr>
    <td style="padding:7px 8px;border-bottom:1px solid var(--border);color:var(--text3)">${i+1}</td>
    <td style="padding:7px 8px;border-bottom:1px solid var(--border)">
      <div style="font-weight:600">${it.merchant||'-'}</div>
      <div style="font-size:11px;color:var(--text3)">${it.cat1||''}${it.label?' · '+it.label:''}</div>
      ${(it.workStart||it.workEnd)?`<div style="font-size:10px;color:var(--text3);font-family:'DM Mono',monospace;margin-top:2px">${it.workStart||''}${it.workEnd?' ~ '+it.workEnd:''}</div>`:''}
    </td>
    <td style="padding:7px 8px;border-bottom:1px solid var(--border);text-align:right;font-family:'DM Mono',monospace">₩${(it.supply||0).toLocaleString()}</td>
    <td style="padding:7px 8px;border-bottom:1px solid var(--border);text-align:right;font-family:'DM Mono',monospace;color:var(--warning)">
      ${it.type==='tour'
        ?`<div>원천 ${(it.wht||0).toLocaleString()}</div><div style="font-size:10px;color:var(--accent2)">고용 ${(it.emp||0).toLocaleString()}</div>`
        :`₩${(it.tax||0).toLocaleString()}`}
    </td>
    <td style="padding:7px 8px;border-bottom:1px solid var(--border);text-align:right;font-family:'DM Mono',monospace;color:var(--accent);font-weight:700">₩${(it.pay||0).toLocaleString()}</td>
    <td style="padding:7px 8px;border-bottom:1px solid var(--border);font-size:11px">
      <div>${it.bank||'-'} / ${it.holder||''}</div>
      <div style="font-family:'DM Mono',monospace;color:var(--text3)">${it.account||''}</div>
    </td>
  </tr>`).join('');
  return `<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:12px;min-width:460px">
    <thead><tr style="background:var(--surface2)">
      <th style="padding:6px 8px;border-bottom:1px solid var(--border);color:var(--text3);font-size:10px;text-align:left">#</th>
      <th style="padding:6px 8px;border-bottom:1px solid var(--border);color:var(--text3);font-size:10px;text-align:left">구분/수취인</th>
      <th style="padding:6px 8px;border-bottom:1px solid var(--border);color:var(--text3);font-size:10px;text-align:right">공급가액</th>
      <th style="padding:6px 8px;border-bottom:1px solid var(--border);color:var(--text3);font-size:10px;text-align:right">세액/공제</th>
      <th style="padding:6px 8px;border-bottom:1px solid var(--border);color:var(--accent);font-size:10px;text-align:right">지급액</th>
      <th style="padding:6px 8px;border-bottom:1px solid var(--border);color:var(--text3);font-size:10px;text-align:left">은행/계좌</th>
    </tr></thead>
    <tbody>${rows}</tbody>
  </table></div>`;
}

async function openDetail(id, isAdmin=false){
  document.getElementById('detailModal').style.display='flex';
  document.getElementById('modalBody').innerHTML='<div class="loading"><div class="spinner"></div></div>';
  document.getElementById('modalActions').innerHTML='';
  try{
    if(!GAS_URL||GAS_URL==='YOUR_GAS_URL_HERE') throw new Error('GAS URL이 설정되지 않았습니다');
    const res=await fetch(`${GAS_URL}?action=getDetail&id=${encodeURIComponent(id)}`);
    if(!res.ok) throw new Error('서버 응답 오류 ('+res.status+')');
    const d=await res.json();
    const r=d.row; if(!r) throw new Error('데이터를 찾을 수 없습니다');
    const st=normalizeStatus(r.status);
    let items=[]; try{items=JSON.parse(r.items||'[]');}catch{}

    // 직원에게 보이는 송금일 (승인/완료이면 처리일시)
    const sendDate=(st==='승인'||st==='완료')?(r.processedAt||r.paydate||'처리 완료'):'-';

    // 반려 사유 강조 표시
    const rejectedBox=(st==='반려'&&r.adminNote)
      ? `<div style="margin:8px 0;padding:10px 14px;background:rgba(217,107,107,.07);border:1px solid rgba(217,107,107,.25);border-radius:8px;font-size:13px;color:var(--danger)"><strong>반려 사유:</strong> ${r.adminNote}</div>`
      : '';

    document.getElementById('modalBody').innerHTML=`
      <div class="dr"><span class="dl">요청번호</span><span class="dv mono">${r.id}</span></div>
      <div class="dr"><span class="dl">작성일</span><span class="dv">${r.date}</span></div>
      <div class="dr"><span class="dl">요청자</span><span class="dv">${r.requester}</span></div>
      <div class="dr"><span class="dl">행사명</span><span class="dv">${r.eventname}</span></div>
      <div class="dr"><span class="dl">법인</span><span class="dv">${r.company}</span></div>
      <div class="dr"><span class="dl">총 지급액</span><span class="dv mono" style="color:var(--accent);font-size:16px">₩${(parseInt(r.totalPay)||0).toLocaleString()}</span></div>
      <div class="dr"><span class="dl">상태</span><span class="dv">${sb(st)}</span></div>
      ${(st==='승인'||st==='완료')?`<div class="dr"><span class="dl">송금일</span><span class="dv mono" style="color:var(--success)">${sendDate}</span></div>`:''}
      ${r.memo?`<div class="dr"><span class="dl">메모</span><span class="dv">${r.memo}</span></div>`:''}
      ${rejectedBox}
      ${(isAdmin&&r.adminNote&&st!=='반려')?`<div class="dr"><span class="dl">처리메모</span><span class="dv" style="color:var(--warning)">${r.adminNote}</span></div>`:''}
      <div style="margin:14px 0 8px;font-size:12px;font-weight:700;color:var(--text2)">항목 (${items.length}건)</div>
      ${buildItemsTable(items)}`;

    if(isAdmin && ADMIN_EMAILS.includes(currentUser.email)){
      // 관리자 처리 UI
      const pOpts=['미입금','입금완료','보류','취소'].map(s=>`<option value="${s}" ${r.paystatus===s?'selected':''}>${s}</option>`).join('');
      document.getElementById('modalActions').innerHTML=`
        <div style="width:100%;display:flex;flex-direction:column;gap:12px">
          <div style="background:rgba(139,115,201,.05);border:1px solid rgba(139,115,201,.2);border-radius:8px;padding:12px 14px">
            <div style="font-size:11px;font-weight:700;color:var(--accent2);margin-bottom:10px">💳 입금 처리</div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
              <div style="display:flex;flex-direction:column;gap:5px">
                <label style="font-size:12px;font-weight:600;color:var(--text2)">입금 여부</label>
                <select id="adminPayStatus" style="font-size:13px;padding:9px 10px">${pOpts}</select>
              </div>
              <div style="display:flex;flex-direction:column;gap:5px">
                <label style="font-size:12px;font-weight:600;color:var(--text2)">송금일 (승인 날짜)</label>
                <input type="date" id="adminPayDate" value="${r.paydate||''}" style="font-size:12px;padding:9px 10px">
              </div>
            </div>
          </div>
          <div style="display:flex;flex-direction:column;gap:6px">
            <label style="font-size:12px;font-weight:600;color:var(--text2)">처리 메모 / 반려 사유</label>
            <textarea id="adminNoteInput" placeholder="반려 시 사유를 입력하면 직원에게 표시됩니다" style="font-size:13px;min-height:56px">${r.adminNote||''}</textarea>
          </div>
          <div style="display:flex;gap:8px">
            <button class="btn btn-primary" style="flex:1;justify-content:center" onclick="updStatus('${r.id}','승인')">✅ 승인</button>
            <button class="btn btn-secondary" style="flex:1;justify-content:center" onclick="updStatus('${r.id}','완료')">💸 완료</button>
            <button class="btn btn-danger" style="flex:1;justify-content:center" onclick="updStatus('${r.id}','반려')">✕ 반려</button>
          </div>
        </div>`;
    } else if(st==='반려'){
      // 직원: 반려건 재제출 버튼
      document.getElementById('modalActions').innerHTML=`
        <div style="width:100%;display:flex;gap:8px">
          <button class="btn btn-secondary" style="flex:1;justify-content:center" onclick="document.getElementById('detailModal').style.display='none'">닫기</button>
          <button class="btn" style="flex:1;justify-content:center;background:linear-gradient(135deg,var(--warning),#e8a020);color:white" onclick="document.getElementById('detailModal').style.display='none';resubmit('${r.id}')">✏️ 수정 후 재제출</button>
        </div>`;
    } else {
      document.getElementById('modalActions').innerHTML=`
        <button class="btn btn-secondary" style="flex:1;justify-content:center" onclick="document.getElementById('detailModal').style.display='none'">닫기</button>`;
    }
  }catch(e){
    document.getElementById('modalBody').innerHTML=`<div class="empty-state"><div class="ei">⚠️</div><div>${e.message}</div></div>`;
    document.getElementById('modalActions').innerHTML=`<button class="btn btn-secondary" style="flex:1;justify-content:center" onclick="document.getElementById('detailModal').style.display='none'">닫기</button>`;
  }
}

// ── 반려 후 재제출: 기존 데이터를 폼에 불러옴 ─────────────
async function resubmit(id){
  try{
    showToast('기존 내용을 불러오는 중...','');
    const res=await fetch(`${GAS_URL}?action=getDetail&id=${encodeURIComponent(id)}`);
    const d=await res.json();
    const r=d.row; if(!r) throw new Error('데이터 없음');
    let items=[]; try{items=JSON.parse(r.items||'[]');}catch{}

    // STEP1 채우기
    document.getElementById('f-company').value=r.company||'';
    document.getElementById('f-date').value=new Date().toISOString().split('T')[0]; // 재제출일 = 오늘
    document.getElementById('f-eventname').value=r.eventname||'';
    document.getElementById('f-memo').value=r.memo||'';

    // 항목 다시 생성
    document.getElementById('itemsList').innerHTML=''; seq=0;
    for(const it of items){
      addItem();
      const id2=seq;
      // 대분류/세부구분
      const c1El=document.getElementById(`c1-${id2}`);
      if(c1El){ c1El.value=it.cat1||''; onC1(id2); }
      const c2El=document.getElementById(`c2-${id2}`);
      if(c2El){ c2El.value=it.type||''; onC2(id2); }
      // 나머지 필드
      const set=(f,v)=>{ const e=document.getElementById(`${f}-${id2}`); if(e) e.value=v||''; };
      set('det',it.detail); set('ws',it.workStart); set('we',it.workEnd);
      set('mer',it.merchant); set('biz',it.bizno);
      set('sup',it.supply); set('tax',it.tax);
      set('bnk',it.bank); set('hld',it.holder); set('acc',it.account);
      calc(id2); updH(id2);
    }
    updTotal();
    showTab('write');
    showToast('✅ 기존 내용을 불러왔습니다. 수정 후 다시 제출해주세요.','success');
  }catch(e){
    showToast('❌ 불러오기 실패: '+e.message,'error');
  }
}

async function updStatus(id,status){
  if(status==='반려'){
    const note=document.getElementById('adminNoteInput')?.value||'';
    if(!note.trim()){ showToast('반려 사유를 입력해주세요.','error'); return; }
  }
  const note=document.getElementById('adminNoteInput')?.value||'';
  const paystatus=document.getElementById('adminPayStatus')?.value||'';
  // 승인/완료 시 날짜 자동 입력
  const today=new Date().toISOString().split('T')[0];
  const paydate=document.getElementById('adminPayDate')?.value||((status==='승인'||status==='완료')?today:'');
  const fd=new FormData();
  fd.append('action','updateStatus');fd.append('id',id);fd.append('status',status);
  fd.append('adminNote',note);fd.append('paystatus',paystatus);fd.append('paydate',paydate);
  try{
    const d=await(await fetch(GAS_URL,{method:'POST',body:fd})).json();
    if(d.status==='ok'){showToast(`✅ "${status}"으로 변경됐습니다.`,'success');document.getElementById('detailModal').style.display='none';loadAdminList();}
    else throw new Error(d.message);
  }catch(e){showToast('❌ 변경 실패: '+e.message,'error');}
}

// TABS
function showTab(tab){
  ['write','history','admin'].forEach(t=>{
    const c=document.getElementById(`tabContent-${t}`),b=document.getElementById(`tab-${t}`);
    if(c)c.style.display=t===tab?'block':'none';
    if(b)b.classList.toggle('active',t===tab);
  });
  if(tab==='history')loadHistory();
  if(tab==='admin')loadAdminList();
}

// STATUS BADGE
function sb(s){
  const m={
    '검토중':'bp','대기':'bp',
    '승인':'bc','처리중':'bc',
    '완료':'bd',
    '반려':'br',
    '반려 (재제출 가능)':'br'
  };
  const label={'검토중':'검토중','대기':'검토중','승인':'승인','처리중':'승인','완료':'완료','반려':'반려','반려 (재제출 가능)':'반려'};
  return `<span class="badge ${m[s]||'bp'}">${label[s]||s||'검토중'}</span>`;
}

// TOAST
let _tt=null;
function showToast(msg,type='success'){
  const el=document.getElementById('toast');el.textContent=msg;el.className=`toast ${type} show`;
  clearTimeout(_tt);_tt=setTimeout(()=>el.classList.remove('show'),3500);
}
</script>
